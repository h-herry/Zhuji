server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: user-org-service
  profiles:
    active: dev

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhuji_user_org?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      filters: stat,wall
      web-stat-filter:
        enabled: true
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin

  data:
    redis:
      cluster:
        nodes:
          - localhost:6379
          - localhost:6380
          - localhost:6381
      password:
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

  rabbitmq:
    enabled: true
    host: localhost
    port: 5672
    username: admin
    password: admin
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          max-attempts: 3

  kafka:
    enabled: false
    bootstrap-servers: localhost:9092
    producer:
      retries: 3
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: zhuji-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  cloud:
    nacos:
      discovery:
        enabled: true
        server-addr: localhost:8848
        namespace:
        group: DEFAULT_GROUP
        service: ${spring.application.name}
      config:
        enabled: true
        server-addr: localhost:8848
        namespace:
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhuji.userorg.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

seata:
  enabled: true
  application-id: ${spring.application.name}
  tx-service-group: zhuji_tx_group
  service:
    vgroup-mapping:
      zhuji_tx_group: default
    grouplist:
      default: localhost:8091
  config:
    type: nacos
    nacos:
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace:
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: localhost:8848
      group: SEATA_GROUP
      namespace:

sentinel:
  transport:
    dashboard: localhost:8718
    port: 8719
  datasource:
    ds1:
      nacos:
        server-addr: localhost:8848
        data-id: ${spring.application.name}-sentinel
        group-id: SENTINEL_GROUP
        data-type: json
        rule-type: flow

zhuji:
  security:
    jwt-secret: zhuji-jwt-secret-key-2024
    jwt-expire: 86400000
    permit-urls:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /doc.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /druid/**
  cache:
    type: redis
    default-expire: 3600
    enabled: true
  rate-limit:
    enabled: true
    max-requests: 100
    window-seconds: 60
  logging:
    level: INFO
    console-enabled: true
    file-enabled: true

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    root: INFO
    com.zhuji: DEBUG
  file:
    name: ./logs/${spring.application.name}.log
  pattern:
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} [%X{traceId}] - %msg%n'