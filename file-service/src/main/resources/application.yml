server:
  port: 8084

spring:
  application:
    name: file-service
  profiles:
    active: dev

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/zhuji_file?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root

  data:
    redis:
      cluster:
        nodes:
          - localhost:6379
          - localhost:6380
          - localhost:6381

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 100MB

  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.zhuji.file.entity
  configuration:
    map-underscore-to-camel-case: true

file:
  storage:
    local:
      path: ./uploads
    minio:
      enabled: false
      endpoint: http://localhost:9000
      access-key: minioadmin
      secret-key: minioadmin
      bucket: zhuji

management:
  endpoints:
    web:
      exposure:
        include: '*'

logging:
  level:
    com.zhuji.file: DEBUG