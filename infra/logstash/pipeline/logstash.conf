input {
  tcp {
    port => 5044
    codec => json_lines
  }
}

filter {
  if [type] == "application" {
    grok {
      match => { "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:level} %{DATA:logger} \[%{DATA:traceId}\] - %{GREEDYDATA:message}" }
    }
    date {
      match => [ "timestamp", "yyyy-MM-dd HH:mm:ss.SSS" ]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "zhuji-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}